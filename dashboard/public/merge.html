<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merge Queue — PR Review</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .merge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .merge-stat { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
    .merge-stat .value { font-size: 36px; font-weight: 700; }
    .merge-stat .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-top: 4px; }
    .merge-stat.green .value { color: var(--green); }
    .merge-stat.yellow .value { color: var(--yellow); }

    .section-title { font-size: 18px; font-weight: 600; margin: 24px 0 12px; display: flex; align-items: center; gap: 8px; }

    .merge-table { width: 100%; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); border-collapse: collapse; font-size: 14px; }
    .merge-table thead th { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 12px; text-transform: uppercase; color: var(--text-muted); }
    .merge-table tbody td { padding: 10px 16px; border-bottom: 1px solid var(--border); }
    .merge-table tbody tr:last-child td { border-bottom: none; }
    .merge-table tbody tr:hover { background: var(--bg-tertiary); }
    .merge-table .pr-num { font-weight: 600; font-family: var(--mono); }

    .check-grid { display: flex; gap: 4px; }
    .check-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .check-dot.pass { background: var(--green); }
    .check-dot.fail { background: var(--red); }
    .check-dot[title]:hover { opacity: 0.7; cursor: help; }

    .diff-stat { font-family: var(--mono); font-size: 12px; }
    .diff-stat .add { color: var(--green); }
    .diff-stat .del { color: var(--red); }

    .merge-all-bar { display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 16px; }

    .empty-msg { text-align: center; padding: 40px; color: var(--text-muted); }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>Merge Queue <span>tinyhumansai/openhuman</span></h1>
      <div class="header-actions">
        <a href="/" class="btn btn-sm">Dashboard</a>
        <a href="/cron.html" class="btn btn-sm">Cron</a>
        <button class="btn btn-sm btn-primary" onclick="loadData()">Refresh</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="merge-grid">
      <div class="merge-stat green"><div id="ready-count" class="value">-</div><div class="label">Ready to Merge</div></div>
      <div class="merge-stat yellow"><div id="blocked-count" class="value">-</div><div class="label">Blocked</div></div>
    </div>

    <div id="ready-section">
      <div class="loading">Loading merge queue...</div>
    </div>

    <div id="blocked-section"></div>
  </div>

  <script src="/auth.js"></script>
  <script>
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function timeAgo(d) {
      if (!d) return '';
      const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
      if (s < 60) return 'just now'; if (s < 3600) return Math.floor(s/60) + 'm ago';
      if (s < 86400) return Math.floor(s/3600) + 'h ago'; return Math.floor(s/86400) + 'd ago';
    }

    function checkDots(checks) {
      const labels = {
        not_draft: 'Not draft', no_conflicts: 'No conflicts', has_approval: 'Approved',
        ci_green: 'CI green', cooldown_ok: '30min cooldown'
      };
      return Object.entries(checks).map(([k, v]) =>
        `<span class="check-dot ${v ? 'pass' : 'fail'}" title="${labels[k] || k}: ${v ? 'PASS' : 'FAIL'}"></span>`
      ).join('');
    }

    async function loadData() {
      try {
        const res = await authFetch('/api/trigger/merge-ready');
        const data = await res.json();
        render(data);
      } catch (e) {
        document.getElementById('ready-section').innerHTML = '<div class="empty-msg">Failed to load: ' + e.message + '</div>';
      }
    }

    function render(data) {
      document.getElementById('ready-count').textContent = data.ready.length;
      document.getElementById('blocked-count').textContent = data.not_ready.length;

      // Ready section
      const readyEl = document.getElementById('ready-section');
      if (data.ready.length === 0) {
        readyEl.innerHTML = '<div class="empty-msg">No PRs ready to merge right now</div>';
      } else {
        readyEl.innerHTML = `
          <div class="merge-all-bar">
            <span>${data.ready.length} PR(s) ready to merge</span>
            <button class="btn btn-purple" onclick="mergeAll()">Merge All</button>
          </div>
          <table class="merge-table">
            <thead><tr><th>PR</th><th>Title</th><th>Author</th><th>Diff</th><th>Checks</th><th>Approved</th><th>Action</th></tr></thead>
            <tbody>${data.ready.map(pr => `
              <tr>
                <td class="pr-num"><a href="/pr.html?pr=${pr.id}">#${pr.id}</a></td>
                <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(pr.title)}</td>
                <td>${esc(pr.author)}</td>
                <td class="diff-stat"><span class="add">+${pr.additions}</span> <span class="del">-${pr.deletions}</span></td>
                <td><div class="check-grid">${checkDots(pr.checks)}</div></td>
                <td style="font-size:12px;color:var(--text-muted)">${timeAgo(pr.approved_at)}</td>
                <td><button class="btn btn-sm btn-purple" onclick="mergePr(${pr.id}, this)">Merge</button></td>
              </tr>
            `).join('')}</tbody>
          </table>`;
      }

      // Blocked section
      const blockedEl = document.getElementById('blocked-section');
      if (data.not_ready.length === 0) {
        blockedEl.innerHTML = '';
      } else {
        blockedEl.innerHTML = `
          <div class="section-title" style="margin-top:32px">Blocked (${data.not_ready.length})</div>
          <table class="merge-table">
            <thead><tr><th>PR</th><th>Title</th><th>Author</th><th>Diff</th><th>Checks</th><th>Blocker</th></tr></thead>
            <tbody>${data.not_ready.map(pr => {
              const blockers = Object.entries(pr.checks).filter(([,v]) => !v).map(([k]) => {
                const labels = { not_draft: 'Draft', no_conflicts: 'Conflicts', has_approval: 'No approval', ci_green: 'CI failing', cooldown_ok: 'Cooldown' };
                return labels[k] || k;
              });
              return `
              <tr>
                <td class="pr-num"><a href="/pr.html?pr=${pr.id}">#${pr.id}</a></td>
                <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(pr.title)}</td>
                <td>${esc(pr.author)}</td>
                <td class="diff-stat"><span class="add">+${pr.additions}</span> <span class="del">-${pr.deletions}</span></td>
                <td><div class="check-grid">${checkDots(pr.checks)}</div></td>
                <td>${blockers.map(b => `<span class="badge badge-red">${b}</span>`).join(' ')}</td>
              </tr>`;
            }).join('')}</tbody>
          </table>`;
      }
    }

    async function mergePr(id, btn) {
      btn.disabled = true; btn.textContent = 'Merging...';
      try {
        const res = await authFetch('/api/trigger/merge/' + id, { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
          btn.textContent = 'Merged';
          btn.className = 'btn btn-sm btn-green';
          setTimeout(loadData, 2000);
        } else {
          alert(data.error || 'Merge failed');
          btn.disabled = false; btn.textContent = 'Merge';
        }
      } catch (e) {
        alert('Error: ' + e.message);
        btn.disabled = false; btn.textContent = 'Merge';
      }
    }

    async function mergeAll() {
      if (!confirm('Merge all ready PRs?')) return;
      const btns = document.querySelectorAll('.merge-table .btn-purple');
      for (const btn of btns) {
        const id = btn.getAttribute('onclick').match(/\d+/)[0];
        btn.disabled = true; btn.textContent = 'Merging...';
        try {
          const res = await authFetch('/api/trigger/merge/' + id, { method: 'POST' });
          if (res.ok) { btn.textContent = 'Merged'; btn.className = 'btn btn-sm btn-green'; }
          else { btn.textContent = 'Failed'; btn.className = 'btn btn-sm btn-danger'; }
        } catch { btn.textContent = 'Error'; }
        await new Promise(r => setTimeout(r, 1000)); // 1s between merges
      }
      setTimeout(loadData, 2000);
    }

    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>
