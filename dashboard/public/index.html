<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR Review Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>PR Review Dashboard <span>tinyhumansai/openhuman</span></h1>
      <div class="header-actions">
        <button class="btn btn-sm" onclick="forceSync()">Sync</button>
        <button class="btn btn-sm btn-primary" id="btn-discover" onclick="triggerDiscover()">Discover & Review</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div id="stats-bar" class="stats-bar">
      <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Loading...</div></div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar" id="filter-bar">
      <div class="filter-row">
        <input type="text" id="f-search" placeholder="Search PR #, title, author, label..." class="filter-input filter-search">

        <select id="f-status" class="filter-input">
          <option value="">All statuses</option>
        </select>

        <select id="f-author" class="filter-input">
          <option value="">All authors</option>
        </select>

        <select id="f-insider" class="filter-input">
          <option value="">Insider/Outsider</option>
          <option value="1">Insider</option>
          <option value="0">Outsider</option>
        </select>

        <select id="f-draft" class="filter-input">
          <option value="">Draft/Ready</option>
          <option value="1">Drafts only</option>
          <option value="0">Ready only</option>
        </select>

        <select id="f-mergeable" class="filter-input">
          <option value="">Merge status</option>
          <option value="MERGEABLE">Mergeable</option>
          <option value="CONFLICTING">Conflicts</option>
          <option value="UNKNOWN">Unknown</option>
        </select>
      </div>

      <div class="filter-row">
        <select id="f-review_decision" class="filter-input">
          <option value="">GH review decision</option>
          <option value="APPROVED">Approved</option>
          <option value="CHANGES_REQUESTED">Changes requested</option>
          <option value="NONE">No decision</option>
        </select>

        <select id="f-has_review" class="filter-input">
          <option value="">Reviewed?</option>
          <option value="1">Reviewed</option>
          <option value="0">Not reviewed</option>
        </select>

        <select id="f-has_findings" class="filter-input">
          <option value="">Findings?</option>
          <option value="1">Has findings</option>
          <option value="0">No findings</option>
        </select>

        <select id="f-merge_state" class="filter-input">
          <option value="">Merge state</option>
        </select>

        <select id="f-label" class="filter-input">
          <option value="">All labels</option>
        </select>

        <select id="f-sort" class="filter-input">
          <option value="id">Sort: PR # (newest)</option>
          <option value="updated">Sort: Last updated</option>
          <option value="created">Sort: Created</option>
          <option value="additions">Sort: Additions</option>
          <option value="deletions">Sort: Deletions</option>
          <option value="cycles">Sort: Review cycles</option>
          <option value="findings">Sort: Findings</option>
          <option value="author">Sort: Author</option>
        </select>

        <select id="f-order" class="filter-input">
          <option value="desc">Desc</option>
          <option value="asc">Asc</option>
        </select>

        <button class="btn btn-sm" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <div class="filter-summary" id="filter-summary" style="display:none"></div>

    <div class="pr-table-wrap">
      <table>
        <thead>
          <tr>
            <th>PR #</th>
            <th>Title</th>
            <th>Author</th>
            <th>Insider</th>
            <th>Status</th>
            <th>State</th>
            <th>Diff</th>
            <th>Cycles</th>
            <th>Last Activity</th>
            <th>Duration</th>
            <th>Findings</th>
            <th>Merge</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="pr-table-body">
          <tr><td colspan="13" class="empty-state">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="table-footer" id="table-footer"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
